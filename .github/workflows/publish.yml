# Publishes the package to PyPI using Trusted Publishing (OIDC), no stored credentials.
# Triggered only when a GitHub release is created.
# Requires a trusted publisher configured on PyPI for repo oddbit-project/rick_vfs,
# workflow file publish.yml. See https://docs.pypi.org/trusted-publishers/

name: Publish package

on:
  release:
    types: [created]

jobs:
  deploy:

    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.x'
    - name: Build sdist
      run: |
        python -m pip install --upgrade pip build
        python -m build --sdist
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
