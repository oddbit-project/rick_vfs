# Publishes the package to PyPI using Trusted Publishing (OIDC), no stored credentials.
# Triggered only when a GitHub release is created.
# Requires a trusted publisher configured on PyPI for repo oddbit-project/rick_vfs,
# workflow file publish.yml. See https://docs.pypi.org/trusted-publishers/

name: Publish package

on:
  release:
    types: [created]

jobs:
  deploy:

    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.x'
    - name: Build sdist
      run: |
        python -m pip install --upgrade pip build
        python -m build --sdist
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1
