# Publishes the package to PyPI using Trusted Publishing (OIDC), no stored credentials.
# Triggered when a GitHub release is created, or manually via workflow_dispatch.
# Requires a trusted publisher configured on PyPI for repo oddbit-project/rick_vfs,
# workflow file publish.yml. See https://docs.pypi.org/trusted-publishers/

name: Publish package

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  deploy:

    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Build sdist
      run: |
        python -m pip install --upgrade pip build
        python -m build --sdist
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
